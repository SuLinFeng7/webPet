<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webPet</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        width: 320px;
      }
      .wrap {
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: #111827;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.35;
      }
      .status {
        font-size: 12px;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <strong>webPet</strong>
        <span class="status" id="status">…</span>
      </div>
      <div class="row">
        <button id="toggle">显示/隐藏宠物</button>
        <button id="openOptions" class="secondary">设置</button>
      </div>
      <div class="hint">
        这是项目雏形：当前在所有网页注入一只可拖拽的小宠物；后续会加入游荡、对话、浏览数据记录等。
      </div>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
