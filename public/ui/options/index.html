<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webPet 设置</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 18px 16px;
        display: grid;
        gap: 12px;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.35;
      }
      input[type="checkbox"] {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2 style="margin: 0">webPet 设置</h2>
      <div class="card">
        <label>
          <input id="enabled" type="checkbox" />
          <span>启用宠物（全局）</span>
        </label>
        <div class="hint" style="margin-top: 8px">该开关会影响内容脚本是否渲染宠物（项目雏形）。</div>
      </div>
      <div class="card">
        <div style="font-weight: 600">开发说明</div>
        <div class="hint" style="margin-top: 8px">
          后续会在这里添加：宠物主题、行为速度、对话 API Key、隐私与采集范围等设置项。
        </div>
      </div>
    </div>
    <script type="module" src="./options.js"></script>
  </body>
</html>
